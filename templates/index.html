<!DOCTYPE html>
<html>
<head>
    <title>Resume Upload</title>
    <style>
        body {
            /* Aapki image ke double naam ke mutabiq link handle kar diya hai */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('/static/bg.jpg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white; /* Text white ho jayega taake dark bg par achha lage */
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Form ko thoda center aur pyara karne ke liye styling */
        form {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 20px;
        }

        input[type="submit"] {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <h2>AI Resume Screener - Upload Section</h2>
    
    <form action="/" method="POST" enctype="multipart/form-data">
        <input type="file" name="resume" accept=".pdf,.docx">
        <input type="submit" value="Upload Now">
    </form>

</body>
</html>
